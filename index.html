<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroFlood - Interactive Flood Risk Map</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="title-overlay">
    <h1>ZeroFlood</h1>
    <p>A smart, resource-efficient tool for predicting flood risk in data-scarce environments.</p>
    <span class="hint">Click a marker to explore flood predictions</span>
  </div>
  <div id="info-panel">
    <div id="info-panel-content">
      <span class="label">Regions</span>
      <span id="region-count">9 flood-prone areas</span>
    </div>
  </div>
  <div id="map"></div>
  <div id="modal-backdrop" class="hidden">
    <div id="modal">
      <button id="modal-close">&times;</button>
      <h2 id="modal-title"></h2>
      <p id="modal-description"></p>
      <div class="comparison-wrapper">
        <div class="slider-container" id="modal-slider-container">
          <img id="modal-before" src="" alt="Satellite Image" class="before-image">
          <img id="modal-after" src="" alt="Flood Risk Prediction" class="after-image">
        </div>
        <div class="slider-control">
          <span class="slider-label-left">Satellite</span>
          <input type="range" min="0" max="100" value="50" class="slider" id="modal-slider">
          <span class="slider-label-right">Flood Risk</span>
        </div>
      </div>
      <div class="risk-legend">
        <span class="legend-item"><span class="legend-dot high"></span> High Risk</span>
        <span class="legend-item"><span class="legend-dot medium"></span> Medium Risk</span>
        <span class="legend-item"><span class="legend-dot low"></span> Low Risk</span>
      </div>
    </div>
  </div>
  <div id="credits">
    <span>TerraMind BlueSky Challenge</span>
    <span>Hyeongkyun Kim &middot; Orestis Oikonomou</span>
  </div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="script.js"></script>
</body>
</html>
